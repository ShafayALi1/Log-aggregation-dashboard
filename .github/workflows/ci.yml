name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: backend
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run || python manage.py migrate

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check dashboard.py
        working-directory: frontend
        run: python -m py_compile dashboard.py

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t log-dashboard-backend ./backend

      - name: Build frontend image
        run: docker build -t log-dashboard-frontend ./frontend
